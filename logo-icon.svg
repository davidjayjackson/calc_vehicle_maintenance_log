<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">

  <!-- ── Background ──────────────────────────────────────── -->
  <rect width="100" height="100" rx="18" fill="#1F4E79"/>

  <!-- Subtle gradient overlay for depth -->
  <rect width="100" height="50" rx="18" fill="white" opacity="0.04"/>

  <!-- ── Car ─────────────────────────────────────────────── -->
  <!-- Local car coords: 60 wide × ~31 high (body to y=20, wheels to y=29.5) -->
  <!-- Scale 1.33 → 80×41.  Translate: x=10, y=7 -->
  <g transform="translate(10,7) scale(1.33)">

    <!-- Body silhouette -->
    <path fill="white"
      d="M0 20
         Q0 16 4 14
         L10 11
         L14 3
         Q16 0 20 0
         L40 0
         Q44 0 46 3
         L50 11
         L57 14
         Q60 16 60 20
         Z"/>

    <!-- Wheel wells -->
    <circle cx="15" cy="22" r="9"   fill="#1F4E79"/>
    <circle cx="47" cy="22" r="9"   fill="#1F4E79"/>

    <!-- Tyre rubber -->
    <circle cx="15" cy="22" r="7.5" fill="white"/>
    <circle cx="47" cy="22" r="7.5" fill="white"/>

    <!-- Hubs -->
    <circle cx="15" cy="22" r="3"   fill="#1F4E79"/>
    <circle cx="47" cy="22" r="3"   fill="#1F4E79"/>

    <!-- Windscreen panels -->
    <path fill="#2E75B6" opacity="0.55"
      d="M18 0.5 L15.5 10 L26 10 L26 0.5 Z"/>
    <path fill="#2E75B6" opacity="0.55"
      d="M42 0.5 L44.5 10 L34 10 L34 0.5 Z"/>

  </g>

  <!-- ── Checklist  (right of car, bottom) ─────────────── -->
  <!-- Three horizontal "tick lines" suggesting a log entry -->
  <g stroke="white" stroke-linecap="round" opacity="0.22">
    <line x1="14" y1="62" x2="86" y2="62" stroke-width="3"/>
    <line x1="14" y1="70" x2="70" y2="70" stroke-width="3"/>
    <line x1="14" y1="78" x2="55" y2="78" stroke-width="3"/>
  </g>

  <!-- ── Wrench Badge ────────────────────────────────────── -->
  <!-- Badge circle: medium blue -->
  <circle cx="74" cy="74" r="19" fill="#2E75B6"/>
  <!-- Thin ring highlight -->
  <circle cx="74" cy="74" r="19" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- Wrench inside badge (scale 0.82, same design as banner) -->
  <g transform="translate(74,74) rotate(-45) scale(0.82)">
    <!-- Handle -->
    <rect x="-2.5" y="4" width="5" height="13" rx="2.5" fill="white"/>
    <!-- Head disc -->
    <circle cx="0" cy="0" r="7.5"  fill="white"/>
    <!-- Inner hole -->
    <circle cx="0" cy="0" r="3.5"  fill="#2E75B6"/>
    <!-- Jaw cut -->
    <rect x="-3" y="-9" width="6" height="7.5" fill="#2E75B6"/>
  </g>

</svg>
