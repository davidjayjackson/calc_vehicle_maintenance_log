<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" width="480" height="100">

  <!-- ── Icon Box ─────────────────────────────────────────── -->
  <rect x="8" y="8" width="84" height="84" rx="13" fill="#1F4E79"/>

  <!-- Car (translate to icon box, scale to fill ~71px wide) -->
  <g transform="translate(15,16) scale(1.18)">

    <!-- Body silhouette -->
    <path fill="white"
      d="M0 20
         Q0 16 4 14
         L10 11
         L14 3
         Q16 0 20 0
         L40 0
         Q44 0 46 3
         L50 11
         L57 14
         Q60 16 60 20
         Z"/>

    <!-- Wheel wells (punch through body with background colour) -->
    <circle cx="15" cy="22" r="9"   fill="#1F4E79"/>
    <circle cx="47" cy="22" r="9"   fill="#1F4E79"/>

    <!-- Tyre rubber (white ring) -->
    <circle cx="15" cy="22" r="7.5" fill="white"/>
    <circle cx="47" cy="22" r="7.5" fill="white"/>

    <!-- Wheel hubs -->
    <circle cx="15" cy="22" r="3"   fill="#1F4E79"/>
    <circle cx="47" cy="22" r="3"   fill="#1F4E79"/>

    <!-- Windscreen highlight -->
    <path fill="#2E75B6" opacity="0.55"
      d="M18 0.5 L15.5 10 L26 10 L26 0.5 Z"/>
    <path fill="#2E75B6" opacity="0.55"
      d="M42 0.5 L44.5 10 L34 10 L34 0.5 Z"/>

  </g>

  <!-- Wrench (bottom-right of icon box) -->
  <!-- Head: white disc with inner hole + jaw opening (top = away from handle) -->
  <g transform="translate(76,77) rotate(-45)">
    <!-- Handle -->
    <rect x="-2.5" y="4" width="5" height="13" rx="2.5" fill="white"/>
    <!-- Head disc -->
    <circle cx="0" cy="0" r="7.5" fill="white"/>
    <!-- Inner hole -->
    <circle cx="0" cy="0" r="3.5"  fill="#1F4E79"/>
    <!-- Jaw cut (opens away from handle, at top of head in local coords) -->
    <rect x="-3" y="-9" width="6" height="7.5" fill="#1F4E79"/>
  </g>

  <!-- Light blue accent dot on icon box edge -->
  <circle cx="92" cy="50" r="3" fill="#2E75B6"/>

  <!-- ── Divider ──────────────────────────────────────────── -->
  <line x1="104" y1="10" x2="104" y2="90"
        stroke="#D6E4F0" stroke-width="1.5"/>

  <!-- ── Text ────────────────────────────────────────────── -->

  <!-- "Vehicle Maintenance" — primary title -->
  <text x="118" y="38"
    font-family="Arial, Helvetica, sans-serif"
    font-size="22" font-weight="700"
    fill="#1F4E79">Vehicle Maintenance</text>

  <!-- Accent bar beneath title -->
  <rect x="118" y="46" width="188" height="2.5" rx="1.2" fill="#2E75B6"/>

  <!-- "LOG" — large bold word -->
  <text x="118" y="68"
    font-family="Arial, Helvetica, sans-serif"
    font-size="26" font-weight="700"
    letter-spacing="5"
    fill="#2E75B6">LOG</text>

  <!-- Tagline -->
  <text x="118" y="83"
    font-family="Arial, Helvetica, sans-serif"
    font-size="9.5"
    fill="#999999"
    letter-spacing="0.3">Service History  ·  Fuel Economy  ·  Running Cost Tracker</text>

</svg>
